name: Publish Workers

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "cmd/**"
      - "internal/**"
      - "build/docker/worker.Dockerfile"
      - "go.mod"

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        worker:
          - team-a-worker
          - team-b-worker
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ${{ matrix.worker }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/docker/worker.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            WORKER_BINARY=${{ matrix.worker }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.worker }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.worker }}:latest
