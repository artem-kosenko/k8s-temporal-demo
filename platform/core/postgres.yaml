apiVersion: v1
kind: Service
metadata:
  name: temporal-postgresql
  namespace: temporal-system
spec:
  selector:
    app.kubernetes.io/name: temporal-postgresql
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: temporal-postgresql
  namespace: temporal-system
spec:
  serviceName: temporal-postgresql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: temporal-postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: temporal-postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:16
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: temporal
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: temporal-postgresql
                  key: password
            - name: POSTGRES_DB
              value: temporal
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U temporal
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi

